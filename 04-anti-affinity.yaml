apiVersion: v1
kind: Pod
metadata:
  name: nginx-anti-affinity
  labels:
    env: dev
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: NotIn
            values:
            - us-east-1b
          - key: "project"
            operator: NotIn
            values:
            - amazon
  tolerations:
  - key: "hardware"
    operator: "Equal"
    value: "gpu"
    effect: "NoExecute"          
  containers:
  - name: nginx
    image: nginx
